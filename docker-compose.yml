version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: shopbyback_app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
      - ./docker/php.ini:/usr/local/etc/php/conf.d/custom.ini
    networks:
      - app-network
    depends_on:
      - db
    deploy:
      resources:
        limits:
          cpus: '7.0'
          memory: 4G
        reservations:
          cpus: '3.5'
          memory: 2G

  web:
    image: nginx:stable-alpine
    container_name: shopbyback_web
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    networks:
      - app-network
    depends_on:
      - app
    deploy:
      resources:
        limits:
          cpus: '7.0'
          memory: 4G
        reservations:
          cpus: '3.5'
          memory: 2G

  db:
    image: mysql:8.4
    container_name: shopbyback_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: 1234
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./script/shopby.sql:/docker-entrypoint-initdb.d/1.sql
      - ./docker/my.cnf:/etc/mysql/conf.d/my.cnf
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '5.5'
          memory: 1G
        reservations:
          cpus: '3.25'
          memory: 256M

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: shopbyback_phpmyadmin
    restart: unless-stopped
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: 1234
    ports:
      - "8080:80"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app-network

  messenger_worker:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: shopbyback_worker
    restart: unless-stopped
    working_dir: /var/www/html
    command: >
      sh -c "php bin/console messenger:consume async --time-limit=3600 --memory-limit=256M --no-interaction -vv"
    volumes:
      - ./:/var/www/html
      - ./docker/php.ini:/usr/local/etc/php/conf.d/custom.ini
    depends_on:
      - db
    networks:
      - app-network
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.25'
          memory: 128M

networks:
  app-network:
    driver: bridge

volumes:
  db_data: {}
