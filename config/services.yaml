# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices.html#use-parameters-for-application-configuration
parameters:
    .container.dumper.inline_factories: true
    debug.container.dump: false
    images_directory: '%kernel.project_dir%/public/productos'
    images_category: '%kernel.project_dir%/public/categorias'
    images_subcategory: '%kernel.project_dir%/public/subcategorias'
    images_selfie: '%kernel.project_dir%/public/user/selfie'
    images_tienda: '%kernel.project_dir%/public/tiendas'
    images_marca: '%kernel.project_dir%/public/marcas'
    destacado_icono: '%kernel.project_dir%/public/destacado/icono'
    destacado_imagen: '%kernel.project_dir%/public/destacado/imagen'
    virtual_scenes: '%kernel.project_dir%/public/virtual_scenes'
    multimedia_post: '%kernel.project_dir%/public/multimedia_post'
    excel_files: '%kernel.project_dir%/public/excel/'
    apple_key_path: '%kernel.project_dir%/config/apple/AuthKey_V529YC8G99.p8'

    
services:
     # default configuration for services in *this* file
    _defaults:
        autowire: true      # Automatically injects dependencies in your services.
        autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.

    
    App\Repository\ResetPasswordRequestRepository:
        autowire: true
        autoconfigure: true
        public: false

    App\Security\AuthenticationSuccessHandler:
        tags:
            - { name: kernel.event_subscriber }

    SymfonyCasts\Bundle\ResetPassword\Persistence\ResetPasswordRequestRepositoryInterface:
        alias: App\Repository\ResetPasswordRequestRepository

    App\Service\SendGridEmailVerifier:
        arguments:
            $params: '@parameter_bag'
            
    App\EventSubscriber\LoginListener:
        tags:
            - { name: kernel.event_subscriber }

    app.logger:
        class: App\Service\LoggerService
    
    App\EventSubscriber\ResponseSubscriber:
        arguments:
            $loggerService: '@app.logger'
        tags:
            - { name: 'kernel.event_subscriber' }

    App\Command\ExcelCommand:
        arguments:
            $container: '@service_container'
        tags:
            - { name: 'console.command' }

    App\EventListener\ConsoleCommandListener:
        arguments:
            $logger: '@logger'
            $entityManager: '@doctrine.orm.entity_manager'
        tags:
            - { name: 'kernel.event_subscriber' }
            

    App\Service\QrCodeGenerator: ~

    App\Security\BasicAuthLogoutSubscriber:
        tags:
            - { name: 'kernel.event_subscriber' }
    
    App\EventListener\CacheResponseListener:
        tags:
            - { name: 'kernel.event_listener', event: 'kernel.response', method: 'onKernelResponse' }

    acme_api.event.jwt_created_listener:
        class: App\EventListener\JWTCreatedListener
        tags:
            - { name: kernel.event_listener, event: lexik_jwt_authentication.on_jwt_created, method: onJWTCreated }

    acme_api.event.jwt_decoded_listener:
        class: App\EventListener\JWTDecodedListener
        tags:
            - { name: kernel.event_listener, event: lexik_jwt_authentication.on_jwt_decoded, method: onJWTDecoded }


    App\EventListener\GlobalRateLimiterListener:
        arguments:
            $globalLimiter: '@limiter.global'  # Nombre del servicio de tu rate limiter
        tags:
            - { name: kernel.event_listener, event: kernel.request, priority: 5 }


    Symfony\Bridge\Twig\Mime\BodyRenderer:
        arguments: ['@twig']
        tags: [twig.mime_body_renderer]

    # Servicio principal de transporte dinámico
    App\Mailer\DynamicDbTransport:
        arguments:
            $em: '@doctrine.orm.entity_manager'

    # Factory personalizado para el envío de emails
    App\Service\DynamicMailerFactory:
        arguments:
            $dynamicDbTransport: '@App\Mailer\DynamicDbTransport'
            $dispatcher: '@event_dispatcher'
            $bodyRenderer: '@Symfony\Bridge\Twig\Mime\BodyRenderer'

    # Configuración para que MailerInterface use nuestro factory
    Symfony\Component\Mailer\MailerInterface:
        factory: ['@App\Service\DynamicMailerFactory', 'getMailer']

    app.listener.authentication_success_failure:
        class: App\EventListener\JWTListener
        tags:
            - { name: kernel.event_listener, event: lexik_jwt_authentication.on_authentication_failure, method: onAuthenticationFailure, priority: 10 }
            - { name: kernel.event_listener, event: lexik_jwt_authentication.on_jwt_invalid, method: onJWTInvalid, priority: 10 }
            - { name: kernel.event_listener, event: lexik_jwt_authentication.on_jwt_not_found, method: onJWTNotFound, priority: 10 }
            - { name: kernel.event_listener, event: lexik_jwt_authentication.on_jwt_expired, method: onJWTExpired, priority: 10 }


    Symfony\Component\DependencyInjection\ContainerInterface: '@service_container'

    Symfony\Component\Security\Core\User\UserProviderInterface: '@app_user_provider'
    
    # makes classes in src/ available to be used as services
    # this creates a service per class whose id is the fully-qualified class name
    App\:
        resource: '../src/'
        exclude:
            - '../src/DependencyInjection/'
            - '../src/Entity/'
            - '../src/Kernel.php'

    # add more service definitions when explicit configuration is needed
    # please note that last definitions always *replace* previous ones
