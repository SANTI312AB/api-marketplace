nelmio_cors:
    defaults:
        origin_regex: false  # Permite el uso de expresiones regulares para orígenes
        allow_credentials: false 
        allow_origin:  ['%env(CORS_ALLOW_ORIGIN)%']  # Define orígenes permitidos desde variables de entorno
        allow_methods: ['GET', 'OPTIONS', 'POST', 'PUT', 'PATCH', 'DELETE']
        allow_headers: ['Origin','Content-Type', 'Authorization', 'Accept', 'X-Requested-With']
        max_age: 6300  # Tiempo de caché de la respuesta preflight
    paths:
        '^/': null


        