# see https://symfony.com/doc/current/reference/configuration/framework.html
framework:
    secret: '%env(APP_SECRET)%'
    validation: { enabled: true, enable_attributes: true }
    csrf_protection: false
    http_cache: true
    http_method_override: false
    handle_all_throwables: true
    http_client:
        default_options:
            timeout: 10

    error_controller: 'App\Controller\ErrorController::index'


     # Habilita el soporte de sesión. Ten en cuenta que la sesión SOLO se iniciará si la lees o escribes en ella.
        # Elimina o comenta esta sección para deshabilitar explícitamente el soporte de sesión.
    session:
        enabled: true
        handler_id: null
        cookie_secure: auto
        cookie_samesite: lax
        storage_factory_id: session.storage.factory.native

    rate_limiter:
        limiters:
            # Creamos un limitador para toda la aplicación
            global:
                policy: 'token_bucket'
                # Límite: 100 peticiones...
                limit: 100
                # ...por cada minuto.
                rate: { interval: '1 minute' }

    ## trusted_proxies: 'https://shopby.com.ec' 

    trusted_hosts:
        - '^localhost$'
        #- '^test-rest\.shopby\.com\.ec$'
        #- '^rest\.shopby\.com\.ec$'


    trusted_headers: ['x-forwarded-for', 'x-forwarded-host', 'x-forwarded-proto']
    
    esi: false
    
    router:
        strict_requirements: null
        utf8: true

    php_errors:
        log: false


when@test:
    framework:
        test: true
        session:
            storage_factory_id: session.storage.factory.mock_file
